<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechLuce</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d1a; color: #e0e0e0; padding-bottom: 70px; }

        /* ШАПКА — логотип + кнопка выйти */
        nav {
            background: #11112b;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e1e3a;
        }
        .logo { color: #6c63ff; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        .logout-top { color: #f87171; font-size: 13px; text-decoration: none; padding: 6px 12px; border: 1px solid #f87171; border-radius: 6px; transition: all 0.2s; }
        .logout-top:hover { background: #f87171; color: white; }

        /* ПОИСК — под шапкой */
        .search-bar {
            background: #11112b;
            padding: 10px 16px 12px;
            border-bottom: 2px solid #6c63ff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .search-form { display: flex; gap: 8px; }
        .search-form input { padding: 9px 14px; border-radius: 25px; border: 1px solid #2a2a4a; background: #0d0d1a; color: white; width: 100%; outline: none; font-size: 16px; }
        .search-form input:focus { border-color: #6c63ff; }
        .search-form button { padding: 9px 16px; background: #6c63ff; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .search-form button:hover { background: #574fd6; }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #11112b;
            border-top: 2px solid #6c63ff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 12px;
            z-index: 999;
        }
        .bottom-bar a {
            color: #aaa;
            text-decoration: none;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 0 16px;
            transition: color 0.2s;
        }
        .bottom-bar a span { font-size: 22px; }
        .bottom-bar a:hover { color: #6c63ff; }

        /* КОНТЕЙНЕР */
        .container { max-width: 1280px; margin: 20px auto; padding: 0 14px; }

        /* КНОПКИ */
        .btn { padding: 10px 18px; background: #6c63ff; color: white; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; font-weight: bold; transition: background 0.2s, transform 0.1s; text-align: center; }
        .btn:hover { background: #574fd6; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-gray { background: #1e1e3a; color: #aaa; }
        .btn-gray:hover { background: #2a2a4a; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6c63ff; color: #6c63ff; }
        .btn-outline:hover { background: #6c63ff; color: white; }

        /* СЕТКА ТОВАРОВ */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .product-card { background: #11112b; border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #1e1e3a; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(108,99,255,0.25); border-color: #6c63ff; }
        .product-img { width: 100%; height: 180px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-info { padding: 12px; flex: 1; display: flex; flex-direction: column; }
        .product-brand { color: #6c63ff; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .product-name { color: white; font-size: 15px; font-weight: bold; margin: 5px 0; line-height: 1.3; }
        .price-old { color: #555; text-decoration: line-through; font-size: 12px; }
        .price-new { color: #a78bfa; font-size: 18px; font-weight: bold; }
        .in-stock { color: #4ade80; font-size: 12px; margin: 5px 0; }
        .out-stock { color: #f87171; font-size: 12px; margin: 5px 0; }
        .card-btns { display: flex; gap: 6px; margin-top: auto; padding-top: 10px; }
        .card-btns .btn { flex: 1; padding: 8px 6px; font-size: 12px; }

        /* ФОРМЫ */
        .form-box { max-width: 440px; width: 100%; background: #11112b; padding: 30px; border-radius: 16px; border: 1px solid #1e1e3a; box-shadow: 0 8px 32px rgba(108,99,255,0.15); }
        .form-box h2 { color: white; margin-bottom: 20px; font-size: 22px; }
        .form-box p { color: #888; margin-top: 12px; }
        .form-box a { color: #6c63ff; text-decoration: none; }
        .form-box a:hover { text-decoration: underline; }
        .form-box p > label { display: block; color: #aaa; font-size: 13px; margin-bottom: 4px; margin-top: 10px; }
        .form-box input[type=text], .form-box input[type=password], .form-box input[type=email] {
            width: 100%; padding: 11px 14px; background: #0d0d1a; border: 1px solid #2a2a4a;
            border-radius: 8px; color: white; outline: none; font-size: 16px;
        }
        .form-box input:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.2); }
        .form-box ul { list-style: none; padding: 0; }
        .form-box ul li { color: #888; font-size: 12px; margin: 3px 0; padding-left: 10px; }
        .form-box .helptext { color: #666; font-size: 12px; display: block; margin-top: 4px; }
        .form-box .errorlist li { color: #f87171; }

        .white-box { background: #11112b; padding: 18px; border-radius: 12px; border: 1px solid #1e1e3a; margin-bottom: 14px; }
        .white-box h4 { color: white; }
        .white-box p { color: #aaa; font-size: 14px; margin: 4px 0; }

        .cart-item { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid #1e1e3a; gap: 12px; }
        .cart-item img { width: 70px; height: 70px; object-fit: contain; background: white; border-radius: 8px; padding: 5px; flex-shrink: 0; }

        .detail-box { display: flex; gap: 24px; background: #11112b; padding: 24px; border-radius: 12px; flex-wrap: wrap; border: 1px solid #1e1e3a; }
        .detail-img { width: 320px; height: 320px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 16px; flex-shrink: 0; }
        .detail-img img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .review-box { background: #11112b; padding: 14px; border-radius: 8px; margin: 10px 0; border: 1px solid #1e1e3a; }
        .review-box b { color: white; }
        .review-box p { color: #aaa; margin-top: 5px; font-size: 14px; }

        select, textarea {
            width: 100%; padding: 10px 14px; margin: 5px 0 12px;
            background: #0d0d1a; border: 1px solid #2a2a4a; border-radius: 8px;
            color: white; outline: none; font-size: 16px;
        }
        select:focus, textarea:focus { border-color: #6c63ff; }

        /* АДАПТИВКА */
        @media (max-width: 600px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-img { height: 130px; padding: 8px; }
            .product-info { padding: 9px; }
            .product-name { font-size: 13px; }
            .price-new { font-size: 15px; }
            .card-btns .btn { font-size: 11px; padding: 7px 4px; }
            .detail-img { width: 100%; height: 220px; }
            .detail-box { padding: 16px; gap: 16px; }
            .form-box { padding: 20px 16px; }
            .cart-item img { width: 55px; height: 55px; }
            .container { padding: 0 10px; }
        }
        @media (max-width: 320px) {
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ШАПКА: логотип слева, выйти справа -->
<nav>
    <span class="logo">⚡ ТехноМаркет</span>
    {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" class="logout-top">Выйти</a>
    {% endif %}
</nav>

<!-- ПОИСК -->
{% block searchbar %}
<div class="search-bar">
    <form class="search-form" method="get" action="{% url 'search' %}">
        <input type="text" name="q" placeholder="Поиск товаров...">
        <button type="submit">Найти</button>
    </form>
</div>
{% endblock %}

<!-- КОНТЕНТ -->
<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- НИЖНЯЯ ПАНЕЛЬ -->
<div class="bottom-bar">
    <a href="{% url 'home' %}">
        <span>🏠</span>Главная
    </a>
    {% if user.is_authenticated %}
    <a href="{% url 'cart' %}">
        <span>🛒</span>Корзина
    </a>
    <a href="{% url 'profile' %}">
        <span>👤</span>Профиль
    </a>
    {% else %}
    <a href="{% url 'login' %}">
        <span>🔐</span>Войти
    </a>
    <a href="{% url 'register' %}">
        <span>📝</span>Регистрация
    </a>
    {% endif %}
</div>

</body>
</html>
