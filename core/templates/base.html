<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltessa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg:        #080810;
            --bg2:       #0f0f20;
            --bg3:       #13132a;
            --border:    #1c1c38;
            --border2:   #252545;
            --purple:    #7c6fff;
            --purple2:   #a78bfa;
            --purple-dim: rgba(124,111,255,0.12);
            --purple-glow: rgba(124,111,255,0.3);
            --green:     #4ade80;
            --yellow:    #fbbf24;
            --red:       #f87171;
            --text:      #e8e8f0;
            --text2:     #9090b0;
            --text3:     #505070;
            --radius:    16px;
            --radius-sm: 10px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* ===== NAVIGATION TOP ===== */
        nav {
            background: var(--bg2);
            padding: 13px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 200;
            backdrop-filter: blur(12px);
        }

        .back-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border2);
            background: var(--bg3);
            color: var(--purple);
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: all 0.18s;
            flex-shrink: 0;
        }
        .back-btn:hover { border-color: var(--purple); background: var(--purple-dim); }
        .back-btn:active { transform: scale(0.92); }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 20px; font-weight: 800;
            color: var(--purple);
            letter-spacing: 0.5px;
            position: absolute;
            left: 50%; transform: translateX(-50%);
        }
        .logo span { color: var(--purple2); }

        .nav-spacer { width: 38px; flex-shrink: 0; }

        /* ===== SEARCH BAR ===== */
        .search-bar {
            background: var(--bg2);
            padding: 10px 14px 12px;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 65px; z-index: 190;
        }
        .search-form { display: flex; gap: 8px; }
        .search-form input {
            flex: 1; padding: 11px 16px;
            border-radius: 30px;
            border: 1.5px solid var(--border2);
            background: var(--bg);
            color: var(--text);
            font-size: 15px; font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-form input::placeholder { color: var(--text3); }
        .search-form input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px var(--purple-dim);
        }
        .search-form button {
            padding: 11px 20px;
            background: var(--purple);
            color: white; border: none;
            border-radius: 30px; cursor: pointer;
            font-weight: 600; font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap;
            transition: all 0.18s;
        }
        .search-form button:hover { background: #6a5fff; }
        .search-form button:active { transform: scale(0.96); }

        /* ===== CONTAINER ===== */
        .container { max-width: 640px; margin: 0 auto; padding: 16px 12px; }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 11px 20px;
            background: var(--purple);
            color: white; border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 14px; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.18s;
            text-align: center;
        }
        .btn:hover { background: #6a5fff; transform: translateY(-1px); box-shadow: 0 4px 16px var(--purple-glow); }
        .btn:active { transform: scale(0.97) translateY(0); }
        .btn-gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
        .btn-gray:hover { background: var(--border); color: var(--text); box-shadow: none; }
        .btn-outline { background: transparent; border: 1.5px solid var(--purple); color: var(--purple); }
        .btn-outline:hover { background: var(--purple-dim); box-shadow: 0 0 0 3px var(--purple-dim); transform: none; }
        .btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
        .btn-danger:hover { background: rgba(248,113,113,0.2); box-shadow: none; transform: none; }

        /* ===== PRODUCT GRID ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: var(--bg3);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            animation: fadeUp 0.4s ease both;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--purple);
            border-color: var(--purple);
        }

        .product-img {
            width: 100%; height: 140px;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            padding: 10px; overflow: hidden;
        }
        .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .product-info { padding: 10px 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .product-brand {
            color: var(--purple);
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .product-name { color: var(--text); font-size: 13px; font-weight: 500; line-height: 1.35; }
        .price-old { color: var(--text3); text-decoration: line-through; font-size: 11px; }
        .price-new { color: var(--purple2); font-size: 16px; font-weight: 700; font-family: 'Syne', sans-serif; }
        .in-stock  { color: var(--green);  font-size: 11px; }
        .out-stock { color: var(--red);    font-size: 11px; }

        .card-btns { display: flex; gap: 6px; margin-top: auto; padding-top: 8px; }
        .card-btns .btn { flex: 1; padding: 9px 4px; font-size: 11px; border-radius: 10px; }

        /* ===== FORMS ===== */
        .form-box {
            max-width: 440px; width: 100%;
            background: var(--bg3);
            padding: 28px 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
        }
        .form-box h2 { font-family: 'Syne', sans-serif; color: white; margin-bottom: 20px; font-size: 22px; }
        .form-box p { color: var(--text2); margin-top: 14px; font-size: 14px; }
        .form-box a { color: var(--purple); text-decoration: none; }
        .form-box a:hover { text-decoration: underline; }
        .form-box p > label { display: block; color: var(--text2); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; margin-top: 14px; }
        .form-box input[type=text],
        .form-box input[type=password],
        .form-box input[type=email] {
            width: 100%; padding: 12px 14px;
            background: var(--bg);
            border: 1.5px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text); outline: none; font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-box input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-dim); }
        .form-box ul { list-style: none; padding: 0; }
        .form-box ul li { color: var(--text3); font-size: 12px; margin: 3px 0; padding-left: 10px; }
        .form-box .helptext { color: var(--text3); font-size: 12px; display: block; margin-top: 4px; }
        .form-box .errorlist li { color: var(--red); }

        /* ===== MISC BOXES ===== */
        .white-box { background: var(--bg3); padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 12px; }
        .white-box h4 { color: white; font-size: 15px; }
        .white-box p  { color: var(--text2); font-size: 13px; margin: 4px 0; }

        .detail-box { display: flex; gap: 20px; background: var(--bg3); padding: 20px; border-radius: var(--radius); flex-wrap: wrap; border: 1px solid var(--border); }
        .detail-img { width: 300px; height: 300px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 16px; flex-shrink: 0; }
        .detail-img img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .review-box { background: var(--bg3); padding: 14px; border-radius: var(--radius-sm); margin: 8px 0; border: 1px solid var(--border); }
        .review-box b { color: white; }
        .review-box p { color: var(--text2); margin-top: 5px; font-size: 13px; }

        select, textarea {
            width: 100%; padding: 11px 14px; margin: 5px 0 12px;
            background: var(--bg); border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
            color: var(--text); outline: none; font-size: 15px; font-family: 'DM Sans', sans-serif;
        }
        select:focus, textarea:focus { border-color: var(--purple); }

        /* ===== BOTTOM NAV ===== */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(13,13,22,0.95);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 8px 14px;
            z-index: 999;
        }
        .bottom-bar a {
            color: var(--text3);
            text-decoration: none;
            font-size: 10px; font-weight: 500;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            flex: 1; padding: 6px 4px;
            border-radius: 12px;
            transition: all 0.18s;
        }
        .bottom-bar a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }
        .bottom-bar a:hover { color: var(--purple); background: var(--purple-dim); }
        .bottom-bar a.active { color: var(--purple); }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.10s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.20s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(6) { animation-delay: 0.30s; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .product-img { height: 120px; }
            .product-name { font-size: 12px; }
            .price-new { font-size: 14px; }
            .card-btns .btn { font-size: 10px; padding: 8px 2px; }
            .detail-img { width: 100%; height: 200px; }
            .form-box { padding: 20px 16px; }
            .container { padding: 12px 10px; }
        }
        @media (max-width: 320px) {
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ШАПКА -->
<nav>
    <a href="javascript:history.back()" class="back-btn">←</a>
    <span class="logo">⚡ Volt<span>essa</span></span>
    <span class="nav-spacer"></span>
</nav>

<!-- ПОИСК -->
{% block searchbar %}
<div class="search-bar">
    <form class="search-form" method="get" action="{% url 'search' %}">
        <input type="text" name="q" placeholder="Поиск товаров...">
        <button type="submit">Найти</button>
    </form>
</div>
{% endblock %}

<!-- КОНТЕНТ -->
<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- НИЖНЯЯ ПАНЕЛЬ -->
<div class="bottom-bar">
    <a href="{% url 'home' %}">
        <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9,21 9,12 15,12 15,21"/></svg>
        Главная
    </a>
    {% if user.is_authenticated %}
    <a href="{% url 'cart' %}">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Корзина
    </a>
    {% else %}
    <a href="{% url 'login' %}">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Войти
    </a>
    {% endif %}
    <a href="{% url 'contacts' %}">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6.29 6.29l1.09-1.09a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Контакты
    </a>
    {% if user.is_authenticated %}
    <a href="{% url 'profile' %}">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Профиль
    </a>
    {% else %}
    <a href="{% url 'register' %}">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Регистрация
    </a>
    {% endif %}
</div>

</body>
</html>
