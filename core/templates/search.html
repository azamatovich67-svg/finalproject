{% extends 'base.html' %}
{% block content %}
<h2 style="margin-bottom:20px;">🔍 Результаты поиска: "{{ q }}"</h2>
<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:20px;">
    {% for product in products %}
    <div style="background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        {% if product.image %}
            <img src="{{ product.image.url }}" style="width:100%; height:200px; object-fit:cover;">
        {% endif %}
        <div style="padding:15px;">
            <h3>{{ product.name }}</h3>
            <p style="color:#e94560; font-weight:bold;">{{ product.final_price }} сом</p>
            <a href="{% url 'product_detail' product.slug %}" class="btn" style="margin-top:10px; display:block; text-align:center;">Подробнее</a>
        </div>
    </div>
    {% empty %}
        <p>Ничего не найдено.</p>
    {% endfor %}
</div>
{% endblock %}
